version: 2.1

jobs:
  build:
    docker:
      - image: cimg/node:20.16
    working_directory: ~/repo
    steps:
      - checkout
      - restore_cache:
          key: dependency-cache-{{ checksum "package-lock.json" }}
      - run:
          name: Install Dependencies
          command: npm ci
      - save_cache:
          key: dependency-cache-{{ checksum "package-lock.json" }}
          paths:
            - ~/.npm
      - run:
          name: Build (next build / static export)
          command: npm run build
      - persist_to_workspace:
          root: .
          paths:
            - out

  deploy:
    docker:
      - image: cimg/node:20.16
    working_directory: ~/repo
    steps:
      - attach_workspace:
          at: .
      - run:
          name: Install rsync
          command: sudo apt-get update && sudo apt-get install -y rsync
      - add_ssh_keys
      - run:
          name: Add Lolipop host key
          command: mkdir -p ~/.ssh && ssh-keyscan -p "$SSH_PORT" "$SSH_HOST" >> ~/.ssh/known_hosts
      - run:
          name: Deploy static export via rsync
          command: rsync -avz --delete --stats -e "ssh -p $SSH_PORT" out/ "$SSH_USER@$SSH_HOST:$DEPLOY_PATH"

workflows:
  build_and_deploy:
    jobs:
      - build
      - deploy:
          requires:
            - build
          filters:
            branches:
              only: main
